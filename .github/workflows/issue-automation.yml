name: Issue Management Automation

on:
  issues:
    types: [opened, labeled]

jobs:
  issue-triage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Triage issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const title = issue.title.toLowerCase();
            const body = issue.body ? issue.body.toLowerCase() : '';
            const labels = issue.labels.map(label => label.name);
            
            // Add needs-triage label if not already present
            if (!labels.includes('needs-triage')) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['needs-triage']
              });
            }
            
            // Auto-assign category labels based on title
            const categoryLabels = [];
            if (title.includes('bug')) categoryLabels.push('bug');
            if (title.includes('epic')) categoryLabels.push('epic');
            if (title.includes('maintenance')) categoryLabels.push('maintenance');
            
            // Add category labels if not already present
            for (const label of categoryLabels) {
              if (!labels.includes(label)) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  labels: [label]
                });
              }
            }
            
            // Auto-assign priority labels based on title or body
            const priorityKeywords = {
              'priority-critical': ['critical', 'urgent', 'production', 'outage'],
              'priority-high': ['important', 'high', 'blocking'],
              'priority-medium': ['medium', 'normal'],
              'priority-low': ['low', 'nice-to-have', 'minor']
            };
            
            let highestPriority = 'priority-medium'; // Default
            
            // Check for priority keywords in title and body
            for (const [priority, keywords] of Object.entries(priorityKeywords)) {
              const found = keywords.some(keyword => title.includes(keyword) || body.includes(keyword));
              if (found) {
                highestPriority = priority;
                break; // Stop at highest priority found
              }
            }
            
            // Remove existing priority labels
            const existingPriorityLabels = labels.filter(label => label.startsWith('priority-'));
            for (const label of existingPriorityLabels) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                name: label
              });
            }
            
            // Add highest priority label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: [highestPriority]
            });

  task-breakdown:
    runs-on: ubuntu-latest
    needs: issue-triage
    if: ${{ github.event_name == 'issues' && github.event.action == 'opened' && contains(github.event.issue.title, 'Epic') }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create sub-issues for epic
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const epicTitle = issue.title;
            const epicNumber = issue.number;
            
            // Define sub-tasks
            const subTasks = [
              { name: "Requirements Analysis", number: 1 },
              { name: "Design and Architecture", number: 2 },
              { name: "Implementation", number: 3 },
              { name: "Testing and Documentation", number: 4 }
            ];
            
            // Create sub-issues
            const subIssueNumbers = [];
            for (const task of subTasks) {
              const subIssueTitle = `[SUBTASK] ${epicTitle} - Task ${task.number}: ${task.name}`;
              const subIssueBody = `Related to #${epicNumber}`;
              
              const subIssue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: subIssueTitle,
                body: subIssueBody,
                labels: ['enhancement', 'needs-review']
              });
              
              subIssueNumbers.push(subIssue.data.number);
            }
            
            // Update parent issue with checklist
            const checklist = subIssueNumbers.map(num => `- [ ] #${num}`).join('\n');
            const updatedBody = `${issue.body}\n\n## Epic Tasks\n${checklist}`;
            
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: epicNumber,
              body: updatedBody
            });

  auto-response:
    runs-on: ubuntu-latest
    needs: [issue-triage, task-breakdown]
    if: ${{ github.event_name == 'issues' && github.event.action == 'opened' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Auto-response to issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const author = issue.user.login;
            const labels = issue.labels.map(label => label.name);
            
            // Check if author is first-time contributor in this repo
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              creator: author,
              state: 'all'
            });
            
            const isFirstTime = issues.data.length === 1; // Only this issue exists
            
            // Add first-time-contributor label if applicable
            if (isFirstTime && !labels.includes('first-time-contributor')) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['first-time-contributor']
              });
            }
            
            // Determine response based on issue type
            let response = '';
            
            if (labels.includes('bug')) {
              response = 'Thank you for reporting this bug! Please follow our Bug Report Guidelines to help us reproduce and fix this issue.';
            } else if (labels.includes('epic')) {
              response = 'Thank you for submitting this epic feature request! Please follow our Feature Request Process to help us prioritize and implement this feature.';
            } else if (labels.includes('maintenance')) {
              response = 'Thank you for reporting this maintenance task! Please follow our Maintenance Guidelines to help us schedule and complete this task.';
            }
            
            // Add welcome message for first-time contributors
            if (isFirstTime) {
              response = `Welcome to the repository, @${author}! This is your first issue here. ${response}`;
            }
            
            // Post response comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: response
            });
            
            // Set milestone for high and critical priority issues
            if (labels.includes('priority-high') || labels.includes('priority-critical')) {
              // Check if milestone exists
              const milestones = await github.rest.issues.listMilestones({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open'
              });
              
              const milestone = milestones.data.find(m => m.title === 'v1.0.0');
              
              if (milestone) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  milestone: milestone.number
                });
              }
            }
            
            // Change status from needs-triage to needs-review
            if (labels.includes('needs-triage')) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                name: 'needs-triage'
              });
              
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['needs-review']
              });
            }
